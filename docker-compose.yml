services:
  postgres:
    image: postgres:16
    container_name: openme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openme
      POSTGRES_PASSWORD: openme
      POSTGRES_DB: openme_dev
    ports:
      - "5432:5432"
    volumes:
      - openme_postgres_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./apps/ai-service
    container_name: openme-ai-service
    restart: unless-stopped
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_API_URL: ${GROQ_API_URL:-https://api.groq.com/openai/v1/chat/completions}
    ports:
      - "8000:8000"

volumes:
  openme_postgres_data:
